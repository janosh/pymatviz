name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  tests:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: tests
    if: needs.tests.result == 'success'
    permissions:
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Add readme image URL prefixes
        # needed to make images render on PyPI
        run: |
          sed -i -e 's| assets/| https://github.com/janosh/pymatviz/raw/main/assets/|g' readme.md

      - name: Build package with uv
        run: uv build

      # trusted publishing (OIDC) -- no API token needed; relies on the
      # id-token: write permission above and a publisher configured on PyPI
      # (project settings -> Publishing): owner janosh, repo pymatviz,
      # workflow release.yml. 'always' fails loudly if OIDC is misconfigured.
      - name: Publish to PyPI via trusted publishing
        run: uv publish --trusted-publishing always
