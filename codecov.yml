comment: false
codecov:
  notify:
    after_n_builds: 4 # must match number of pytest-split shards in .github/workflows/test.yml
    wait_for_ci: true
coverage:
  status:
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: success
        only_pulls: true
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: success
